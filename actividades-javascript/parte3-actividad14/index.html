<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Actividad 14</title>
<link rel="stylesheet" href="estilos.css">
<script src="script.js"></script>
</head>
<body onload="iniciarCalculadora()">
<header><h1>Actividad 14</h1></header>
<main>
<div class="contenedor">
<h2 class="titulo">Calculadora JavaScript</h2>
<div class="zona-calculadora">
<div class="calculadora">
<input type="text" id="pantalla" value="0" disabled>
<div class="teclas">
<button class="limpiar" onclick="limpiarPantalla()">C</button>
<button class="borrar" onclick="borrarCaracter()">DEL</button>
<button class="operador" onclick="insertarOperador('/')">÷</button><br>
<button onclick="insertarNumero('7')">7</button>
<button onclick="insertarNumero('8')">8</button>
<button onclick="insertarNumero('9')">9</button>
<button class="operador" onclick="insertarOperador('*')">x</button><br>
<button onclick="insertarNumero('4')">4</button>
<button onclick="insertarNumero('5')">5</button>
<button onclick="insertarNumero('6')">6</button>
<button class="operador" onclick="insertarOperador('-')">-</button><br>
<button onclick="insertarNumero('1')">1</button>
<button onclick="insertarNumero('2')">2</button>
<button onclick="insertarNumero('3')">3</button>
<button class="operador" onclick="insertarOperador('+')">+</button><br>
<button class="cero" onclick="insertarNumero('0')">0</button>
<button onclick="insertarDecimal()">.</button>
<button class="igual" onclick="calcularResultado()">=</button>
</div>
</div>
</div>
<div class="btn-container"><a href="../../index.html" class="btn-volver">Volver al inicio</a></div>
</div>
</main>
<footer><p>&copy; 2026 José Gómez Contreras</p></footer>
</body>
</html>
