<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<body>
<header><h1>Actividad 7</h1></header>
<main>
<div class="contenedor">
<h2 class="titulo">Persona, provincia y pueblo</h2>
<p class="texto">Selecciona una provincia andaluza y escribe los datos de la persona.</p>
<div class="bloque">
<label for="nombre">Nombre</label><input id="nombre" type="text" placeholder="Nombre">
<label for="provincia">Provincia</label><select id="provincia">
<option value="">Selecciona una provincia</option>
<option value="almeriense">Almería</option>
<option value="gaditano o gaditana">Cádiz</option>
<option value="cordobés o cordobesa">Córdoba</option>
<option value="granadino o granadina">Granada</option>
<option value="onubense">Huelva</option>
<option value="jienense">Jaén</option>
<option value="malagueño o malagueña">Málaga</option>
<option value="sevillano o sevillana">Sevilla</option>
</select>
<label for="pueblo">Pueblo</label><input id="pueblo" type="text" placeholder="Pueblo">
<button id="boton-mostrar-persona">Mostrar frase</button>
<div id="resultado" class="resultado">Resultado</div>
</div>
<div class="btn-container"><a href="../../index.html" class="btn-volver">Volver al inicio</a></div>
</div>
</main>
