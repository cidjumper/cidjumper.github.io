<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="../comun.css">

<body>

<div class="pagina-actividad">
  <header class="cabecera-actividad">
    <h1>Parte 3 · Actividad 7</h1>
    <p>Mostrar nombre, provincia andaluza seleccionada y pueblo de la persona.</p>
  </header>

  <main class="panel-actividad">

<h2>Persona, provincia y pueblo</h2>
<div class="zona-controles">
  <div class="grupo-campo">
    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" placeholder="Escribe el nombre">
  </div>
  <div class="grupo-campo">
    <label for="provincia">Provincia andaluza</label>
    <select id="provincia">
      <option value="">Selecciona una provincia</option>
      <option value="almeriense">Almería</option>
      <option value="gaditano o gaditana">Cádiz</option>
      <option value="cordobés o cordobesa">Córdoba</option>
      <option value="granadino o granadina">Granada</option>
      <option value="onubense">Huelva</option>
      <option value="jienense">Jaén</option>
      <option value="malagueño o malagueña">Málaga</option>
      <option value="sevillano o sevillana">Sevilla</option>
    </select>
  </div>
  <div class="grupo-campo">
    <label for="pueblo">Pueblo</label>
    <input id="pueblo" type="text" placeholder="Escribe el pueblo">
  </div>
</div>
<div class="fila-botones">
  <button id="boton-mostrar-persona">Mostrar frase</button>
</div>
<div id="resultado" class="resultado"></div>

    <div class="fila-botones volver-inicio">
      <a class="boton-enlace" href="../parte3/index.html">Volver a la Parte 3</a>
      <a class="boton-enlace" href="../../index.html">Volver a la página principal</a>
    </div>
  </main>
</div>

  <script src="script.js"></script>
</body>
</html>
